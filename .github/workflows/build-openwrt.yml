name: Build OpenWrt

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: 'Enable SSH debug session'
        required: false
        type: boolean
        default: false
      config_url:
        description: 'Optional raw URL of .config (takes priority over repository .config)'
        required: false
        type: string
        default: ''
  repository_dispatch:

permissions:
  contents: read

env:
  REPO_URL: https://github.com/VIKINGYFY/immortalwrt.git
  REPO_BRANCH: main
  CONFIG_FILE: .config
  FEEDS_CONF: feeds.conf.default
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  CUSTOM_SOURCE_DIR: custom
  UPLOAD_BIN_DIR: false
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

  # OpenWrt ccache
  CCACHE_DIR: ${{ github.workspace }}/openwrt/.ccache
  CCACHE_COMPILERCHECK: content
  CCACHE_MAXSIZE: 5G

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: 1) Create OpenWrt build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get -qq update
          sudo apt-get -qq install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler fastjar flex gawk gettext \
            gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 \
            libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev \
            libmpfr-dev libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool \
            lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf \
            python3 python3-pip python3-ply python3-docutils python3-setuptools rsync \
            scons squashfs-tools subversion swig texinfo node-uglify upx-ucl unzip \
            vim wget xmlto xxd zlib1g-dev zstd
          sudo timedatectl set-timezone "$TZ"

      - name: 2) Download OpenWrt source code
        run: |
          git clone --depth 1 "$REPO_URL" -b "$REPO_BRANCH" openwrt
          git -C openwrt log --oneline -1

      - name: 3) Get pre-build resources feeds
        run: |
          if [ -f "$FEEDS_CONF" ]; then
            cp "$FEEDS_CONF" openwrt/feeds.conf.default
          fi

          if [ -f "$DIY_P1_SH" ]; then
            chmod +x "$DIY_P1_SH"
          fi

          cd openwrt

          if [ -f "$GITHUB_WORKSPACE/$DIY_P1_SH" ]; then
            "$GITHUB_WORKSPACE/$DIY_P1_SH"
          fi

          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 4) Apply custom source modifications and config
        run: |
          if [ -d files ]; then
            cp -r files openwrt/files
          fi

          if [ -d "$CUSTOM_SOURCE_DIR" ]; then
            rsync -a "$CUSTOM_SOURCE_DIR"/ openwrt/
          fi

          CONFIG_URL="${{ inputs.config_url || '' }}"

          if [ -n "$CONFIG_URL" ]; then
            if ! curl -fsSL "$CONFIG_URL" -o openwrt/.config; then
              echo "config_url download failed, fallback to repository $CONFIG_FILE"
              if [ -f "$CONFIG_FILE" ]; then
                cp "$CONFIG_FILE" openwrt/.config
              fi
            fi
          elif [ -f "$CONFIG_FILE" ]; then
            cp "$CONFIG_FILE" openwrt/.config
          fi

          mkdir -p openwrt/dl

          if [ -d "$GITHUB_WORKSPACE/$CUSTOM_SOURCE_DIR/dl" ]; then
            rsync -a "$GITHUB_WORKSPACE/$CUSTOM_SOURCE_DIR/dl"/ openwrt/dl/
          fi

          if [ -f "$DIY_P2_SH" ]; then
            chmod +x "$DIY_P2_SH"
          fi

          cd openwrt

          if [ -f "$GITHUB_WORKSPACE/$DIY_P2_SH" ]; then
            "$GITHUB_WORKSPACE/$DIY_P2_SH"
          fi

      - name: 5) Normalize config and enable ccache
        run: |
          cd openwrt

          if [ ! -f .config ]; then
            echo "::error::.config not found. Please provide repository .config or workflow config_url."
            exit 1
          fi

          # Enable OpenWrt build ccache.
          ./scripts/config -e CCACHE || echo 'CONFIG_CCACHE=y' >> .config

          make defconfig

          mkdir -p dl .ccache tmp

          echo "OpenWrt target info:"
          grep -E '^CONFIG_TARGET_|^CONFIG_CCACHE=' .config || true

      - name: Generate cache metadata
        id: cache_meta
        run: |
          cd openwrt

          OPENWRT_COMMIT="$(git rev-parse --short=12 HEAD)"
          TARGET_BOARD="$(grep '^CONFIG_TARGET_BOARD=' .config | cut -d '"' -f 2 || true)"
          TARGET_SUBTARGET="$(grep '^CONFIG_TARGET_SUBTARGET=' .config | cut -d '"' -f 2 || true)"
          TARGET_PROFILE="$(grep '^CONFIG_TARGET_PROFILE=' .config | cut -d '"' -f 2 || true)"

          if [ -z "$TARGET_BOARD" ]; then
            TARGET_BOARD="unknown-board"
          fi

          if [ -z "$TARGET_SUBTARGET" ]; then
            TARGET_SUBTARGET="unknown-subtarget"
          fi

          if [ -z "$TARGET_PROFILE" ]; then
            TARGET_PROFILE="unknown-profile"
          fi

          echo "openwrt_commit=$OPENWRT_COMMIT" >> "$GITHUB_OUTPUT"
          echo "target_board=$TARGET_BOARD" >> "$GITHUB_OUTPUT"
          echo "target_subtarget=$TARGET_SUBTARGET" >> "$GITHUB_OUTPUT"
          echo "target_profile=$TARGET_PROFILE" >> "$GITHUB_OUTPUT"

          echo "openwrt_commit=$OPENWRT_COMMIT"
          echo "target_board=$TARGET_BOARD"
          echo "target_subtarget=$TARGET_SUBTARGET"
          echo "target_profile=$TARGET_PROFILE"

      - name: Restore downloads dl cache
        id: cache_dl
        uses: actions/cache/restore@v5
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-openwrt-dl-${{ steps.cache_meta.outputs.target_board }}-${{ steps.cache_meta.outputs.target_subtarget }}-${{ hashFiles('openwrt/.config', 'openwrt/feeds.conf.default') }}
          restore-keys: |
            ${{ runner.os }}-openwrt-dl-${{ steps.cache_meta.outputs.target_board }}-${{ steps.cache_meta.outputs.target_subtarget }}-
            ${{ runner.os }}-openwrt-dl-

      - name: Restore tools and toolchain cache
        id: cache_toolchain
        uses: actions/cache/restore@v5
        with:
          path: |
            openwrt/staging_dir/host*
            openwrt/staging_dir/toolchain-*
            openwrt/build_dir/host*
            openwrt/build_dir/toolchain-*
            openwrt/tmp
          key: ${{ runner.os }}-openwrt-toolchain-${{ steps.cache_meta.outputs.target_board }}-${{ steps.cache_meta.outputs.target_subtarget }}-${{ steps.cache_meta.outputs.openwrt_commit }}
          restore-keys: |
            ${{ runner.os }}-openwrt-toolchain-${{ steps.cache_meta.outputs.target_board }}-${{ steps.cache_meta.outputs.target_subtarget }}-
            ${{ runner.os }}-openwrt-toolchain-

      - name: Restore ccache
        id: cache_ccache
        uses: actions/cache/restore@v5
        with:
          path: openwrt/.ccache
          key: ${{ runner.os }}-openwrt-ccache-${{ steps.cache_meta.outputs.target_board }}-${{ steps.cache_meta.outputs.target_subtarget }}-${{ steps.cache_meta.outputs.openwrt_commit }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            ${{ runner.os }}-openwrt-ccache-${{ steps.cache_meta.outputs.target_board }}-${{ steps.cache_meta.outputs.target_subtarget }}-${{ steps.cache_meta.outputs.openwrt_commit }}-
            ${{ runner.os }}-openwrt-ccache-${{ steps.cache_meta.outputs.target_board }}-${{ steps.cache_meta.outputs.target_subtarget }}-
            ${{ runner.os }}-openwrt-ccache-

      - name: Optional SSH debug
        uses: P3TERX/ssh2actions@v1.0.0
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.ssh == true) || contains(github.event.action || '', 'ssh') }}
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: 6) Download source archives
        run: |
          cd openwrt

          make download -j8

          # Remove obviously broken/incomplete downloads.
          find dl -size -1024c -exec rm -f {} \;

      - name: Save downloads dl cache
        if: steps.cache_dl.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: openwrt/dl
          key: ${{ steps.cache_dl.outputs.cache-primary-key }}

      - name: 7) Build tools and toolchain
        run: |
          cd openwrt

          echo "ccache location: $CCACHE_DIR"
          ccache -s || true

          make tools/install -j"$(nproc)" || make tools/install -j1 V=s
          make toolchain/install -j"$(nproc)" || make toolchain/install -j1 V=s

          ccache -s || true

      - name: Save tools and toolchain cache
        if: steps.cache_toolchain.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            openwrt/staging_dir/host*
            openwrt/staging_dir/toolchain-*
            openwrt/build_dir/host*
            openwrt/build_dir/toolchain-*
            openwrt/tmp
          key: ${{ steps.cache_toolchain.outputs.cache-primary-key }}

      - name: 8) Build firmware with existing config
        run: |
          cd openwrt

          echo "ccache location: $CCACHE_DIR"
          ccache -s || true

          # Build. If parallel build fails, retry serial with verbose log.
          make -j"$(nproc)" || make -j1 V=s

          ccache -s || true

      - name: Save ccache
        if: always() && steps.cache_ccache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: openwrt/.ccache
          key: ${{ steps.cache_ccache.outputs.cache-primary-key }}

      - name: Collect build output info
        id: build_meta
        run: |
          cd openwrt

          DEVICE_NAME="$(grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' | head -n 1 || true)"

          if [ -n "$DEVICE_NAME" ]; then
            DEVICE_NAME="_$DEVICE_NAME"
          fi

          FILE_DATE="_$(date +"%Y%m%d%H%M")"

          FIRMWARE_DIR="$(find "$GITHUB_WORKSPACE/openwrt/bin/targets" -mindepth 2 -maxdepth 2 -type d | head -n 1 || true)"

          if [ -z "$FIRMWARE_DIR" ] || [ ! -d "$FIRMWARE_DIR" ]; then
            echo "::error::Firmware output directory not found."
            find "$GITHUB_WORKSPACE/openwrt/bin" -maxdepth 5 -type f || true
            exit 1
          fi

          echo "device_name=$DEVICE_NAME" >> "$GITHUB_OUTPUT"
          echo "file_date=$FILE_DATE" >> "$GITHUB_OUTPUT"
          echo "firmware_dir=$FIRMWARE_DIR" >> "$GITHUB_OUTPUT"

          echo "Firmware directory: $FIRMWARE_DIR"
          find "$FIRMWARE_DIR" -maxdepth 1 -type f -printf '%f\n' | sort

      - name: 7) Upload firmware to GitHub Actions artifacts
        uses: actions/upload-artifact@v6
        with:
          name: OpenWrt_firmware${{ steps.build_meta.outputs.device_name }}${{ steps.build_meta.outputs.file_date }}
          path: ${{ steps.build_meta.outputs.firmware_dir }}
          if-no-files-found: error

      - name: Upload full bin directory optional
        if: env.UPLOAD_BIN_DIR == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: OpenWrt_bin${{ steps.build_meta.outputs.device_name }}${{ steps.build_meta.outputs.file_date }}
          path: openwrt/bin
          if-no-files-found: error
